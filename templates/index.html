<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✈️ Aircraft Detection System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
            overflow: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header p {
            color: #666;
            font-size: 16px;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: start;
        }

        .webcam-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .webcam-label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #webcam-video {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #f0f0f0;
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            max-height: 400px;
            object-fit: cover;
        }

        .hidden {
            display: none;
        }

        #canvas {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 12px;
        }

        .controls-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
        }

        .segmented {
            display: inline-flex;
            border: 1px solid #ddd;
            border-radius: 10px;
            overflow: hidden;
        }

        .segmented button {
            border: none;
            padding: 10px 14px;
            background: #f8f8f8;
            color: #444;
            text-transform: none;
            letter-spacing: 0;
            font-weight: 600;
        }

        .segmented button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .btn-small {
            padding: 10px 14px;
            font-size: 14px;
            flex: 0 0 auto;
        }

        .loc-status {
            font-size: 13px;
            color: #555;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            flex: 1;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e0e0e0;
        }

        .results-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .results-label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e9ecef;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: #999;
        }

        .result-box.loading {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .result-content {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .result-item {
            text-align: left;
            background: white;
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .result-label {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .result-subtext {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        .cues-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
        }

        .cues-list li {
            font-size: 13px;
            color: #555;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
        }

        .cues-list li:last-child {
            border-bottom: none;
        }

        .cues-list li::before {
            content: "→ ";
            color: #667eea;
            font-weight: 600;
            margin-right: 6px;
        }

        .status-message {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 12px;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status-message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f0f0f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .frame-counter {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 8px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px;
            }

            .header h1 {
                font-size: 24px;
            }

            .content {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .results-section {
                order: -1;
            }

            .result-box {
                min-height: 200px;
            }
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }

        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }

        .empty-state {
            text-align: center;
            color: #999;
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .frame-display {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #eee;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✈️ Aircraft Detection</h1>
            <p>Capture a burst of photos and let AI identify the aircraft</p>
        </div>

        <div class="content">
            <div class="webcam-section">
                <div class="webcam-label">📹 Webcam Feed</div>
                <div class="controls-row">
                    <div class="segmented">
                        <button id="mode-live" class="active" data-mode="OPENSKY">Live (OpenSky)</button>
                        <button id="mode-sandbox" data-mode="SANDBOX">Sandbox</button>
                    </div>
                    <button id="loc-btn" class="btn-secondary btn-small">Use My Location</button>
                    <div class="loc-status" id="loc-status">Using default: LGW</div>
                </div>
                <video id="webcam-video" muted autoplay playsinline></video>
                <canvas id="canvas"></canvas>
                <div class="button-group">
                    <button id="capture-btn" class="btn-primary">📸 Capture & Classify</button>
                    <button id="clear-btn" class="btn-secondary">🔄 Clear</button>
                </div>
                <div class="button-group">
                    <label for="file-input" class="btn-secondary" style="text-align:center; cursor:pointer;">⬆️ Upload &amp; Classify</label>
                    <input id="file-input" type="file" accept="image/jpeg,image/png" style="display:none;">
                </div>
                <div class="frame-counter" id="frame-counter"></div>
            </div>

            <div class="results-section">
                <div class="results-label">🏅 Classification Results</div>
                <div id="status-message" class="status-message"></div>
                <div id="match-box" class="result-box empty-state" style="margin-bottom:12px;">
                    <div>
                        <p style="color:#666;">Provider & match info will appear here.</p>
                    </div>
                </div>
                <div id="result-box" class="result-box empty-state">
                    <div>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                        <p>Awaiting classification...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='main.js') }}"></script>
    <script>
        window.DEFAULT_OBSERVER = {
            lat: {{ default_observer_lat | tojson }},
            lon: {{ default_observer_lon | tojson }},
            radius_km: {{ default_radius_km | tojson }}
        };
    </script>
</body>
</html>
